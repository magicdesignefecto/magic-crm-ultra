    <!-- SPA Redirect Script for GitHub Pages -->
    <script>
        // Single Page App redirect for GitHub Pages
        // Converts the path to a query parameter and redirects to index.html
        // so the SPA router can handle it properly
        (function () {
            var pathSegmentsToKeep = 1; // Keep the repo name segment (/magic-crm-ultra/)
            var loc = window.location;
            var fullPath = loc.pathname;

            // Extract the path after the base (repo name)
            var segments = fullPath.split('/');
            // segments[0] = "", segments[1] = "magic-crm-ultra", segments[2+] = route
            var basePath = '/' + segments.slice(1, 1 + pathSegmentsToKeep).join('/') + '/';
            var routePath = '/' + segments.slice(1 + pathSegmentsToKeep).join('/');

            // Only redirect if there's an actual route (not just the base)
            if (routePath && routePath !== '/') {
                loc.replace(
                    loc.protocol + '//' + loc.hostname + (loc.port ? ':' + loc.port : '') +
                    basePath + '?p=' + encodeURIComponent(routePath) +
                    (loc.search ? '&q=' + encodeURIComponent(loc.search.slice(1)) : '') +
                    loc.hash
                );
            }
        })();
    </script>
